<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Coach - 智能健身教练</title>
    <!-- Google Fonts & Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
      /* Smooth transitions and dark background base to avoid white flashes */
      html, body {
        background-color: #0e0e0e;
        color: #e5e2e1;
        scroll-behavior: smooth;
      }
      /* Custom neon scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0e0e0e;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #abd600;
      }
    </style>
  </head>
  <body class="bg-[#0e0e0e] text-[#e5e2e1] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
